experiment_name: bcq_final_ne5_v2
seed: 7
device: "cpu"

data:
  table_fqdn: "masds-thesis.mass_thesis.rl_dataset_1h_scaled"
  limit: 50000

algorithm:
  name: "bcq"
  batch_size: 256
  gamma: 0.99
  n_critics: 2

training:
  n_epochs: 50
  n_steps_per_epoch: 2000   # 50*2000 = 100k steps
  eval_interval: 1
  save_interval: 1
